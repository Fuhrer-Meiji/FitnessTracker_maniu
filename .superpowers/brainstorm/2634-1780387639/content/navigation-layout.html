<h2>选择底部导航布局</h2>
<p class="subtitle">App 的主要导航方式，决定用户如何切换页面</p>

<div class="options">
  <div class="option" data-choice="bottom-bar" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>底部导航栏 (Bottom Navigation)</h3>
      <p>3-5 个主要标签页在底部，拇指可及</p>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="padding:12px">
          <div style="display:flex;justify-content:space-around;background:#f0f0f0;border-radius:8px;padding:8px">
            <div style="text-align:center;font-size:12px">
              <div>🏋️</div>
              <div>训练</div>
            </div>
            <div style="text-align:center;font-size:12px;color:#6C63FF">
              <div>📊</div>
              <div>进度</div>
            </div>
            <div style="text-align:center;font-size:12px">
              <div>👤</div>
              <div>我的</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="drawer" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>侧边抽屉导航 (Drawer)</h3>
      <p>左侧滑出菜单，主界面更干净，适合功能较多的情况</p>
    </div>
  </div>
  <div class="option" data-choice="tabs-top" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>顶部 Tab 导航</h3>
      <p>顶部标签页切换，适合较少分类</p>
    </div>
  </div>
</div>
