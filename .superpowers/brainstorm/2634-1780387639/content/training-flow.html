<h2>训练记录流程</h2>
<p class="subtitle">如何开始一次训练记录？选你喜欢的操作方式</p>

<div class="options">
  <div class="option" data-choice="quick-start" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>快速开始模式</h3>
      <p>点击"开始训练" → 选择动作 → 记录组数/次数/重量</p>
      <div style="margin-top:8px;background:#f9f9f9;border-radius:6px;padding:10px;font-size:12px;line-height:1.6">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="background:#6C63FF;color:white;padding:2px 8px;border-radius:4px;font-size:11px">开始训练</span>
          <span>→</span>
          <span>选择动作 (深蹲/卧推/...)</span>
          <span>→</span>
          <span>录入组数</span>
        </div>
        <div style="color:#888">即开即用，不需要提前准备</div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="plan-first" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>按计划执行模式</h3>
      <p>先在"计划"页面创建训练计划 → 训练时选择计划自动带入动作</p>
      <div style="margin-top:8px;background:#f9f9f9;border-radius:6px;padding:10px;font-size:12px;line-height:1.6">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span>📋 创建计划</span>
          <span>→</span>
          <span style="background:#6C63FF;color:white;padding:2px 8px;border-radius:4px;font-size:11px">执行计划</span>
          <span>→</span>
          <span>自动填入动作</span>
        </div>
        <div style="color:#888">适合有固定训练安排的用户</div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>两者都支持</h3>
      <p>快速开始 和 按计划执行 两种模式并存，用户自由选择</p>
      <div style="margin-top:8px;background:#e8f4e8;border-radius:6px;padding:10px;font-size:12px">
        ✅ 推荐：兼顾灵活性和规范性
      </div>
    </div>
  </div>
</div>
