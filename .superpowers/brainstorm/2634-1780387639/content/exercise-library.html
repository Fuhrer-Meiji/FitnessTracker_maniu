<h2>动作库初始化方式</h2>
<p class="subtitle">首次使用时，App 里的训练动作从哪里来？</p>

<div class="options">
  <div class="option" data-choice="preset" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>预设常用动作库</h3>
      <p>App 自带常见训练动作（卧推、深蹲、硬拉、弯举等），开箱即用</p>
      <div style="margin-top:8px;background:#f9f9f9;border-radius:6px;padding:8px;font-size:11px">
        <div>💪 胸部：卧推、飞鸟、上斜卧推 ...</div>
        <div>🦵 腿部：深蹲、腿举、弓步蹲 ...</div>
        <div>🔙 背部：引体向上、划船、硬拉 ...</div>
        <div>🏋️ 肩部：推举、侧平举、前平举 ...</div>
        <div>💥 手臂：弯举、三头下压 ...</div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>完全自定义</h3>
      <p>动作库为空，用户自己逐个添加需要的动作</p>
      <div style="margin-top:8px;color:#888;font-size:12px">适合有特定训练体系的高级用户</div>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>预设 + 自定义（推荐）</h3>
      <p>App 提供预设动作库，用户也可以随时添加/编辑自己的动作</p>
      <div style="margin-top:8px;background:#e8f4e8;border-radius:6px;padding:8px;font-size:12px">
        ✅ 推荐：兼顾易用性和灵活性
      </div>
    </div>
  </div>
</div>
